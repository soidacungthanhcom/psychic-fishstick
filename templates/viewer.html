<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MÀN HÌNH THI ĐẤU V5.4 - CÓ NHẮC NHỞ</title>
    <script src="/static/socket.io.js"></script>
    <style>
        :root {
            --bg-color: #000;
            --text-color: #fff;
            --box-bg: #111;
            --blue-color: #0055ff;
            --red-color: #ff0000;
        }
        body.light-mode { --bg-color: #fff; --text-color: #000; --box-bg: #f0f0f0; }
        body { margin: 0; background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: 0.3s; }
        
        .header { height: 15vh; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; background: #111; border-bottom: 2px solid #333; }
        .logo img { height: 70px; }
        
        .header-center { text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .round-info { font-size: 2.2em; color: #00ff00; font-weight: bold; text-transform: uppercase; line-height: 1.2; }
        .category-info { font-size: 1.5em; color: yellow; font-weight: bold; text-transform: uppercase; margin-top: 5px; text-shadow: 0 0 5px #000; }

        .main-board { flex: 1; display: flex; justify-content: space-between; padding: 10px 20px; }
        
        .team { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .team-name { font-size: 2.5em; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        
        .score-box { font-size: 15em; font-weight: bold; line-height: 1; padding: 10px; border-radius: 20px; min-width: 320px; text-align: center; background: var(--box-bg); transition: 0.3s; border: 8px solid transparent; }
        .blue-score { color: var(--blue-color); border-color: var(--blue-color); }
        .red-score { color: var(--red-color); border-color: var(--red-color); }

        .lights-area { margin-top: 30px; display: flex; gap: 30px; }
        .lights-column { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .label-light { font-size: 1em; opacity: 0.8; font-weight: bold; text-transform: uppercase; }
        .light-row { display: flex; gap: 8px; }
        
        .light { width: 45px; height: 45px; border-radius: 50%; background: #333; border: 2px solid #555; transition: 0.1s; }
        body.light-mode .light { background: #ddd; border: 2px solid #999; }

        .light.active-blue { background: var(--blue-color) !important; box-shadow: 0 0 20px var(--blue-color); border-color: #fff; }
        .light.active-red { background: var(--red-color) !important; box-shadow: 0 0 20px var(--red-color); border-color: #fff; }

        .center-area { width: 220px; text-align: center; margin-top: 40px; }
        .timer { font-size: 5em; font-weight: bold; color: yellow !important; background: #000 !important; border: 4px solid #555; border-radius: 15px; padding: 10px 0; box-shadow: 0 0 15px rgba(0,0,0,0.5); }

        @keyframes blink-blue { 0% { background-color: var(--box-bg); color: var(--blue-color); } 50% { background-color: var(--blue-color); color: #fff; } 100% { background-color: var(--box-bg); color: var(--blue-color); } }
        @keyframes blink-red { 0% { background-color: var(--box-bg); color: var(--red-color); } 50% { background-color: var(--red-color); color: #fff; } 100% { background-color: var(--box-bg); color: var(--red-color); } }
        .winner-blue { animation: blink-blue 0.5s infinite; border-color: #fff !important; }
        .winner-red { animation: blink-red 0.5s infinite; border-color: #fff !important; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><img src="/static/logo.png" onerror="this.style.opacity=0"></div>
        
        <div class="header-center">
            <div class="round-info" id="roundDisplay">CHUẨN BỊ</div>
            <div class="category-info" id="categoryDisplay">---</div>
        </div>

        <div class="logo" style="opacity:0"><img src="/static/logo.png"></div>
    </div>
<div id="logBox" style="position: absolute; bottom: 20px; right: 20px; width: 350px; background: rgba(0,0,0,0.85); border: 2px solid #555; border-radius: 10px; color: #fff; padding: 10px; z-index: 999;">
    <div style="color: yellow; border-bottom: 1px solid #555; margin-bottom: 8px; font-weight: bold; font-size: 1.2em;">📜 LỊCH SỬ NHẢY ĐIỂM</div>
    <div id="logContent" style="display: flex; flex-direction: column; gap: 5px; font-size: 1.1em; height: 100px; overflow-y: hidden;"></div>
</div>
    <div class="main-board">
        <div class="team">
            <div class="team-name" style="color: var(--blue-color)" id="nameBlue">XANH</div>
            <div style="color: #ff9900; font-size: 1.5em; font-weight: bold; margin-bottom: 10px;" id="viewWarnBlue">Lỗi: 0/3</div>
            
            <div class="score-box blue-score" id="scoreBlue">0</div>
            
            <div class="lights-area">
                <div class="lights-column">
                    <span class="label-light">Tay (+1)</span>
                    <div class="light-row" id="row_b1"><div class="light" id="l_b1_1"></div><div class="light" id="l_b1_2"></div><div class="light" id="l_b1_3"></div><div class="light" id="l_b1_4"></div><div class="light" id="l_b1_5"></div></div>
                </div>
                <div class="lights-column">
                    <span class="label-light">Chân (+2)</span>
                    <div class="light-row" id="row_b2"><div class="light" id="l_b2_1"></div><div class="light" id="l_b2_2"></div><div class="light" id="l_b2_3"></div><div class="light" id="l_b2_4"></div><div class="light" id="l_b2_5"></div></div>
                </div>
            </div>
        </div>

        <div class="center-area">
            <div class="timer" id="timer">00:00</div>
        </div>

        <div class="team">
            <div class="team-name" style="color: var(--red-color)" id="nameRed">ĐỎ</div>
            <div style="color: #ff9900; font-size: 1.5em; font-weight: bold; margin-bottom: 10px;" id="viewWarnRed">Lỗi: 0/3</div>
            
            <div class="score-box red-score" id="scoreRed">0</div>

            <div class="lights-area">
                <div class="lights-column">
                    <span class="label-light">Tay (+1)</span>
                    <div class="light-row" id="row_r1"><div class="light" id="l_r1_1"></div><div class="light" id="l_r1_2"></div><div class="light" id="l_r1_3"></div><div class="light" id="l_r1_4"></div><div class="light" id="l_r1_5"></div></div>
                </div>
                <div class="lights-column">
                    <span class="label-light">Chân (+2)</span>
                    <div class="light-row" id="row_r2"><div class="light" id="l_r2_1"></div><div class="light" id="l_r2_2"></div><div class="light" id="l_r2_3"></div><div class="light" id="l_r2_4"></div><div class="light" id="l_r2_5"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var socket = io();

       socket.on('viewer_receive_update', function(data) {
            if(data.type === 'info') {
                document.getElementById('nameBlue').innerText = data.blueName;
                document.getElementById('nameRed').innerText = data.redName;
                document.getElementById('roundDisplay').innerText = data.round;
                document.getElementById('categoryDisplay').innerText = data.category || "";
                resetEffects();
            }
            if(data.type === 'score') {
                document.getElementById('scoreBlue').innerText = data.blue;
                document.getElementById('scoreRed').innerText = data.red;
            }
            
            // --- CÒI ĐIỆN TỬ BÁO HẾT GIỜ ---
            if(data.type === 'timer') {
                document.getElementById('timer').innerText = data.timeStr;
                if(data.timeStr === "00:00") {
                    let audio = document.getElementById('buzzerSound');
                    if(audio) audio.play().catch(e => console.log("Lỗi còi"));
                }
            }
            
            if(data.type === 'theme') {
                if(data.mode === 'light') document.body.classList.add('light-mode');
                else document.body.classList.remove('light-mode');
            }
            
            // --- NHẮC NHỞ LỖI VĐV ---
            if(data.type === 'warning') {
                document.getElementById('viewWarnBlue').innerText = `Lỗi: ${data.blueWarn}/3`;
                document.getElementById('viewWarnRed').innerText = `Lỗi: ${data.redWarn}/3`;
            }
            
            // --- NHẬN LỊCH SỬ LOGS ĐIỂM ---
            if(data.type === 'log') {
                let logDiv = document.getElementById('logContent');
                if(logDiv) {
                    logDiv.innerHTML = `<div style="color: #00ffcc;">${data.message}</div>` + logDiv.innerHTML;
                    // Xóa bớt dòng cũ nếu quá dài (giữ lại 4 dòng mới nhất)
                    if (logDiv.children.length > 4) { logDiv.removeChild(logDiv.lastChild); }
                }
            }
            
            if(data.type === 'reset') {
                resetEffects();
                let logDiv = document.getElementById('logContent');
                if(logDiv) logDiv.innerHTML = ""; // Xóa lịch sử khi qua trận mới
            }
        });

        socket.on('server_send_vote', function(d) {
            let sideCode = d.side === 'blue' ? 'b' : 'r';
            let lightId = `l_${sideCode}${d.points}_${d.judge_id}`;
            let light = document.getElementById(lightId);
            let colorClass = d.side === 'blue' ? 'active-blue' : 'active-red';

            if(light) {
                light.classList.add(colorClass);
                setTimeout(() => light.classList.remove(colorClass), 800);
            }
        });

        socket.on('viewer_finish', function(data) {
            if(data.winner === 'XANH') document.getElementById('scoreBlue').classList.add('winner-blue');
            if(data.winner === 'ĐỎ') document.getElementById('scoreRed').classList.add('winner-red');
        });

        function resetEffects() {
            document.getElementById('scoreBlue').classList.remove('winner-blue');
            document.getElementById('scoreRed').classList.remove('winner-red');
        }
    </script>
<audio id="buzzerSound" src="/static/buzzer.mp3" preload="auto"></audio>
</body>
</html>
