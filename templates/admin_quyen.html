<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN CHẤM QUYỀN V6.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .control-bar { margin-bottom: 20px; background: #333; padding: 15px; border-radius: 10px; display: flex; justify-content: center; gap: 15px; align-items: center; flex-wrap: wrap;}
        .scores-container { display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; }
        .judge-box { background: #111; border: 2px solid #555; border-radius: 10px; width: 180px; padding: 15px; position: relative; }
        .judge-title { color: #00ffcc; font-weight: bold; }
        .judge-score { font-size: 3em; font-weight: bold; color: yellow; }
        .judge-details { font-size: 0.8em; color: #aaa; font-style: italic; min-height: 35px; border-top: 1px solid #333; margin-top: 10px; padding-top: 5px; }
        .dropped { text-decoration: line-through; color: #ff4d4d !important; opacity: 0.4; }
        .box-dropped { border-color: #ff4d4d; }
        .total-area { background: #000; padding: 20px; border-radius: 20px; border: 4px solid #0066cc; }
        .total-score { font-size: 5em; font-weight: bold; color: #fff; }
        button, select { padding: 10px 20px; font-size: 1.1em; cursor: pointer; font-weight: bold; border-radius: 5px; border: none; }
    </style>
</head>
<body>

    <div class="control-bar" style="background: #222; border: 2px solid #555;">
        <button onclick="loadList()" style="background: #ff9900; color: #000;">📥 TẢI DS QUYỀN</button>
        <select id="athleteSelect" style="width: 350px;">
            <option value="">-- Chọn Vận động viên --</option>
        </select>
        <span id="athleteInfo" style="color: #00ffcc; font-weight: bold; font-size: 1.2em; min-width: 200px;"></span>
    </div>

    <div class="control-bar">
        <select id="configSelect" onchange="changeConfig()">
            <option value="5">05 Giám định (Bỏ Cao/Thấp)</option>
            <option value="3">03 Giám định (Tính tổng)</option>
        </select>
        <button onclick="resetScores()" style="background: #cc0000; color: white;">🔄 RESET BẢNG ĐIỂM</button>
        <button onclick="saveResult()" style="background: #0066cc; color: white;">💾 LƯU LÊN SHEET</button>
    </div>

    <div class="scores-container" id="scoresBoard"></div>

    <div class="total-area">
        <div style="color: #0066cc; font-weight: bold;">TỔNG ĐIỂM CUỐI CÙNG</div>
        <div class="total-score" id="totalScore">0.00</div>
    </div>

    <script>
        var socket = io();
        var lastData = null;
        var currentAthlete = {}; // Biến lưu VĐV đang được chọn

   // --- 1. TẢI DANH SÁCH TỪ GOOGLE SHEET (BẢN CHUẨN) ---
function loadList() {
    // Thêm ?type=QUYEN vào sau đường dẫn để gọi đúng danh sách thi Quyền
    fetch('/get_match_list?type=QUYEN').then(r => r.json()).then(data => {
        let sel = document.getElementById('athleteSelect');
        sel.innerHTML = '<option value="">-- Chọn Vận động viên --</option>';
        data.forEach(item => {
            // Item lấy từ DS_Quyen sẽ có dạng: id, name, unit, category
            sel.innerHTML += `<option value='${JSON.stringify(item)}'>${item.id} - ${item.name} (${item.unit}) - ${item.category}</option>`;
        });
        alert(`Đã tải thành công ${data.length} VĐV thi Quyền!`);
    }).catch(e => alert("Lỗi kết nối hoặc chưa có dữ liệu trong Sheet DS_Quyen!"));
}
        // --- 2. XỬ LÝ KHI CHỌN VĐV ---
        document.getElementById('athleteSelect').addEventListener('change', function() {
            if(this.value) {
                currentAthlete = JSON.parse(this.value);
                document.getElementById('athleteInfo').innerText = `Đang thi: ${currentAthlete.name} | ${currentAthlete.category}`;
            } else {
                currentAthlete = {};
                document.getElementById('athleteInfo').innerText = "";
            }
        });

        // --- 3. XỬ LÝ ĐIỂM SỐ TỪ SERVER TRẢ VỀ ---
        socket.on('update_board', function(data) {
            lastData = data;
            renderBoard(data);
        });

        socket.on('config_updated', function(data) {
            document.getElementById('configSelect').value = data.num;
        });

        function renderBoard(data) {
            let container = document.getElementById('scoresBoard');
            container.innerHTML = '';
            data.scores.forEach(s => {
                let isDropped = data.dropped.includes(s.id);
                container.innerHTML += `
                    <div class="judge-box ${isDropped ? 'box-dropped' : ''}">
                        <div class="judge-title">GIÁM ĐỊNH ${s.id}</div>
                        <div class="judge-score ${isDropped ? 'dropped' : ''}">${s.val || '-'}</div>
                        <div class="judge-details">${s.details || 'Chờ chấm...'}</div>
                    </div>
                `;
            });
            document.getElementById('totalScore').innerText = data.total;
        }

        // --- 4. LƯU KẾT QUẢ VÀO GOOGLE SHEET ---
        function saveResult() {
            if(!currentAthlete.id) {
                alert("⚠️ Khoan đã! Bạn phải chọn Vận động viên ở danh sách thả xuống trước khi lưu!");
                return;
            }
            if(!lastData || lastData.total === "Waiting...") {
                alert("⚠️ Giám định chưa chấm xong, chưa thể lưu!"); return;
            }

            if(confirm(`Bạn có chắc chắn lưu [ ${lastData.total} điểm ] cho VĐV [ ${currentAthlete.name} ]?`)) {
                fetch('/save_to_sheet', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        type: 'QUYEN',
                        matchId: currentAthlete.id,
                        name: currentAthlete.name,
                        total: lastData.total,
                        // Gộp tất cả hóa đơn lỗi của 5 giám định thành 1 chuỗi dài
                        details: lastData.scores.map(s => `GĐ${s.id}: ${s.val} (${s.details})`).join(" || ")
                    })
                }).then(r => r.json()).then(d => {
                    if(d.status === 'success' || d.result === 'success') {
                        alert("✅ Đã lưu thành công vào tab KQ_Quyen!");
                    } else {
                        alert("❌ Có lỗi xảy ra khi lưu: " + (
